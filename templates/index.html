<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps Agent</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: monospace;
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #1e3c72;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16305a;
        }

        .result {
            margin-top: 25px;
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            margin-top: 15px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI DevOps Agent</h1>
    <p>Paste your logs below:</p>

    <form id="form" action="/analyze" method="post">
        <textarea name="log_input">{{ log_input or "" }}</textarea>
        <button type="submit">Analyze Logs</button>
    </form>

    <div class="loading" id="loading" style="display:none;">
        ⏳ Analyzing logs...
    </div>

    {% if result %}
    <div class="result">
        <strong>Result:</strong><br><br>
        {{ result }}
    </div>
    {% endif %}
</div>

<script>
    const form = document.getElementById('form');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', () => {
        loading.style.display = 'block';
    });
</script>

</body>
</html>

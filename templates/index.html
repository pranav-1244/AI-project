<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps Agent</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }
        textarea {
            width: 100%;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .result {
            margin-top: 20px;
            background: #eef;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI DevOps Agent</h1>
        <p>Paste your logs below:</p>

        <form action="/analyze" method="post">
            <textarea name="log_input" rows="10">{{ log_input or "" }}</textarea><br><br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
        <div class="result">
            <h3>Result:</h3>
            <p>{{ result }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps Agent</title>
    <h1>FRONTEND VERSION LOADED</h1>
    <style>
        body {
            font-family: Arial;
            background: #1e3c72;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
        }

        .result {
            margin-top: 20px;
            background: white;
            color: black;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI DevOps Agent</h1>

    <textarea id="logInput" placeholder="Paste logs here..."></textarea>
    <button onclick="analyzeLogs()">Analyze</button>

    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
async function analyzeLogs() {
    const logInput = document.getElementById("logInput").value;

    const response = await fetch("http://127.0.0.1:8000/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ log_input: logInput })
    });

    const data = await response.json();

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerText = data.result;
}
</script>

</body>
</html>
